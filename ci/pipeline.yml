---
resources:
  - name: repo
    type: git
    icon: github
    source:
      uri: git@github.com:singh-gur/util_scripts.git
      branch: ((git_branch))
      private_key: ((github_deploy_key))
      fetch_tags: true

  - name: docker-image
    type: registry-image
    icon: docker
    source:
      repository: regv2.gsingh.io/personal/util_scripts
      username: ((registry_username))
      password: ((registry_password))

jobs:
  - name: validate
    public: true
    plan:
      - get: repo
        trigger: true

      - task: validate-scripts
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: alpine
              tag: latest

          inputs:
            - name: repo

          run:
            path: sh
            args:
              - -euc
              - |
                apk add --no-cache bash

                for script in repo/*; do
                  if [ -f "$script" ] && [ -x "$script" ]; then
                    bash -n "$script"
                  fi
                done

                bash -n repo/ci/scripts/generate-tags.sh
                bash -n repo/ci/set-pipeline.sh

  - name: build-and-push
    public: true
    plan:
      - get: repo
        trigger: true
        passed: [validate]

      - task: generate-tags
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: alpine/git
              tag: latest

          inputs:
            - name: repo

          outputs:
            - name: tags

          run:
            path: sh
            args:
              - -euc
              - |
                apk add --no-cache bash
                repo/ci/scripts/generate-tags.sh repo tags

      - task: build-image
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: concourse/oci-build-task
              tag: latest

          inputs:
            - name: repo

          outputs:
            - name: image

          params:
            CONTEXT: repo
            DOCKERFILE: repo/Dockerfile

          run:
            path: build

      - put: docker-image
        params:
          image: image/image.tar
          additional_tags: tags/all

      - task: sign-image
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: alpine
              tag: latest

          inputs:
            - name: tags

          params:
            COSIGN_PRIVATE_KEY: ((cosign_private_key))
            COSIGN_PASSWORD: ((cosign_password))
            IMAGE_REPO: regv2.gsingh.io/personal/util_scripts
            REGISTRY_USERNAME: ((registry_username))
            REGISTRY_PASSWORD: ((registry_password))

          run:
            path: sh
            args:
              - -euc
              - |
                apk add --no-cache cosign

                cosign login regv2.gsingh.io -u "$REGISTRY_USERNAME" -p "$REGISTRY_PASSWORD"

                for tag in $(cat tags/all); do
                  cosign sign --key env://COSIGN_PRIVATE_KEY "${IMAGE_REPO}:${tag}" -y
                done

groups:
  - name: main
    jobs:
      - validate
      - build-and-push
